<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix Tours & Travels — Digital Card</title>
<meta property="og:title" content="Fenix Tours & Travels — Digital Card">
<meta property="og:description" content="View this digital visiting card from Fenix Tours & Travels Pvt Ltd">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --orange: #E8540A;
  --dark: #F5F5F0;
  --surface: #FFFFFF;
  --surface2: #F8F8F5;
  --border: rgba(201,168,76,0.35);
  --text: #1A1A1A;
  --muted: #666;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'DM Sans', sans-serif;
  background: #F5F5F0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ENVELOPE SCENE */
.scene {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  position: relative;
}

/* Subtle background pattern */
.scene::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(232,84,10,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Gold particle dots */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.p {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: float linear infinite;
}
@keyframes float {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  10% { opacity: 0.6; transform: translateY(-10px) scale(1); }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
}

/* ENVELOPE */
.envelope-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 400px;
}
.envelope {
  width: 100%;
  aspect-ratio: 1.6/1;
  position: relative;
  cursor: pointer;
  animation: envAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes envAppear {
  from { opacity: 0; transform: scale(0.7) rotate(-3deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

.env-body {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #FDF8F0 0%, #F5EDD8 100%);
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.4);
  overflow: hidden;
}
.env-body::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to top, rgba(201,168,76,0.04), transparent);
}

/* V fold lines */
.env-fold-left {
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 0 200px 200px;
  border-color: transparent transparent rgba(201,168,76,0.08) transparent;
}
.env-fold-right {
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 200px 200px 0;
  border-color: transparent rgba(201,168,76,0.08) transparent transparent;
}

/* Top flap */
.env-flap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(160deg, #F0E8D0 0%, #EDE0C0 100%);
  border-radius: 8px 8px 0 0;
  border-bottom: 1px solid var(--border);
  transform-origin: top center;
  transform: rotateX(0deg);
  transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
  z-index: 2;
  clip-path: polygon(0 0, 100% 0, 50% 95%);
}
.env-flap.open {
  transform: rotateX(180deg);
}

/* Wax seal */
.seal {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 52px; height: 52px;
  border-radius: 50%;
  background: radial-gradient(circle, #E8540A 0%, #B22222 100%);
  border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
  transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 0 20px rgba(232,84,10,0.4);
}
.seal.hidden { opacity: 0; transform: translate(-50%,-50%) scale(0); }
.seal-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
}

.env-label {
  position: absolute;
  bottom: 18px; left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.7;
  z-index: 4;
}
.tap-hint {
  text-align: center;
  font-size: 11px;
  color: #999;
  margin-top: 14px;
  letter-spacing: 0.08em;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* CARD sliding out */
.card-slide {
  position: absolute;
  top: 10%; left: 5%; right: 5%;
  z-index: 1;
  transform: translateY(0);
  transition: transform 1s cubic-bezier(0.34,1.2,0.64,1);
}
.card-slide.revealed {
  transform: translateY(-110%);
}

/* THE ACTUAL CARD */
.card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid rgba(201,168,76,0.4);
  overflow: hidden;
  box-shadow: 0 0 40px rgba(201,168,76,0.15), 0 20px 60px rgba(0,0,0,0.12);
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s;
}
.card.visible { opacity: 1; transform: translateY(0); }

/* Card sections */
.card-header {
  padding: 24px 24px 0;
  position: relative;
}
.card-logo {
  height: 60px;
  width: auto;
  object-fit: contain;
  object-position: left;
  display: block;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.5s ease 0.8s, transform 0.5s ease 0.8s;
  filter: drop-shadow(0 2px 8px rgba(232,84,10,0.3));
}
.card-logo.in { opacity: 1; transform: translateY(0); }

.gold-line {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  margin: 16px 0;
  opacity: 0;
  transform: scaleX(0);
  transition: opacity 0.6s ease 1s, transform 0.6s ease 1s;
}
.gold-line.in { opacity: 1; transform: scaleX(1); }

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1.1;
  margin-bottom: 4px;
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.5s ease 1.1s, transform 0.5s ease 1.1s;
}
.card-name.in { opacity: 1; transform: translateX(0); }

.card-role {
  font-size: 11px;
  color: var(--orange);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.5s ease 1.2s;
}
.card-role.in { opacity: 1; }

.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  opacity: 0;
  transform: translateX(-15px);
}
.info-row.in { opacity: 1; transform: translateX(0); }
.info-row:nth-child(1) { transition: opacity 0.4s ease 1.3s, transform 0.4s ease 1.3s; }
.info-row:nth-child(2) { transition: opacity 0.4s ease 1.4s, transform 0.4s ease 1.4s; }

.info-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.info-text { font-size: 13px; color: var(--text); }
.info-text a { color: var(--text); text-decoration: none; }

.card-msg {
  font-size: 12px;
  color: #666;
  font-style: italic;
  border-left: 2px solid var(--gold);
  padding: 6px 12px;
  margin: 14px 0 0;
  line-height: 1.6;
  display: none;
  opacity: 0;
  transition: opacity 0.5s ease 1.5s;
}
.card-msg.in { opacity: 1; }

.card-divider {
  height: 1px;
  background: rgba(201,168,76,0.25);
  margin: 20px 24px 0;
  opacity: 0;
  transition: opacity 0.5s ease 1.5s;
}
.card-divider.in { opacity: 1; }

/* Services */
.services-section {
  padding: 16px 24px;
  opacity: 0;
  transition: opacity 0.6s ease 1.6s;
}
.services-section.in { opacity: 1; }
.services-label {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.services-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px 8px;
}
.svc {
  font-size: 9.5px;
  color: #888;
  line-height: 2;
  display: flex; align-items: center; gap: 4px;
}
.svc-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }

/* Office contacts */
.office-bar {
  background: #FAF8F3;
  border-top: 1px solid rgba(201,168,76,0.2);
  padding: 12px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  opacity: 0;
  transition: opacity 0.5s ease 1.7s;
}
.office-bar.in { opacity: 1; }
.oc { font-size: 10px; color: #777; text-decoration: none; }
.oc:hover { color: var(--gold); }

/* Social */
.social-bar {
  background: #F0EDE4;
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.5s ease 1.8s;
}
.social-bar.in { opacity: 1; }
.social-label { font-size: 9px; color: #999; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; }
.si {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  transition: border-color 0.2s, transform 0.2s;
}
.si:hover { border-color: var(--gold); transform: scale(1.1); }
.si-fb { background: #1877F2; border-color: transparent; }
.si-ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); border-color: transparent; }
.si-li { background: #0A66C2; border-color: transparent; }

/* Action buttons */
.actions {
  padding: 0 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 1.9s, transform 0.6s ease 1.9s;
}
.actions.in { opacity: 1; transform: translateY(0); }

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.03em;
  transition: opacity 0.2s, transform 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-call {
  background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
  color: #0A0A0A;
  font-weight: 600;
}
.btn-wa { background: #25D366; color: #fff; }
.btn-save {
  background: transparent;
  color: #888;
  border: 1px solid #DDD;
}
.btn-save:hover { border-color: var(--gold); color: var(--gold); }

.footer {
  text-align: center;
  font-size: 10px;
  color: #AAA;
  margin-top: 20px;
  letter-spacing: 0.06em;
}
.footer a { color: var(--gold); text-decoration: none; opacity: 0.6; }

/* Full card view after envelope */
.full-view {
  display: none;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 10;
  animation: riseUp 0.7s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes riseUp {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>

  mob.href = 'tel:' + mobile.replace(/\s/g,'');
  var em = document.getElementById('c-email');
  em.textContent = email;
  em.href = 'mailto:' + email;
  if (msg) {
    var msgEl = document.getElementById('c-msg');
    msgEl.textContent = '\u201c' + msg + '\u201d';
    msgEl.style.display = 'block';
  }
  document.getElementById('btn-call').href = 'tel:' + mobile.replace(/[\s+\-]/g,'');
  document.getElementById('btn-wa').href = 'https://wa.me/' + mobile.replace(/[\s+\-]/g,'');
}

function openEnvelope() {
  document.getElementById('env-flap').classList.add('open');
  document.getElementById('seal').classList.add('hidden');
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('card-slide').classList.add('revealed');

  setTimeout(function() {
    document.getElementById('envelope-wrap').style.display = 'none';
    var fv = document.getElementById('full-view');
    fv.style.display = 'block';

    setTimeout(function() {
      var card = document.getElementById('card');
      card.classList.add('visible');
      document.getElementById('card-logo').classList.add('in');
      document.getElementById('gold-line').classList.add('in');
      document.getElementById('c-name').classList.add('in');
      document.getElementById('c-role').classList.add('in');
      document.getElementById('row-mobile').classList.add('in');
      document.getElementById('row-email').classList.add('in');
      document.getElementById('c-msg').classList.add('in');
      document.getElementById('card-divider').classList.add('in');
      document.getElementById('services-section').classList.add('in');
      document.getElementById('office-bar').classList.add('in');
      document.getElementById('social-bar').classList.add('in');
      document.getElementById('actions').classList.add('in');
    }, 100);
  }, 900);
}

function saveContact() {
  var vcard = [
    'BEGIN:VCARD', 'VERSION:3.0',
    'FN:' + name,
    'ORG:Fenix Tours & Travels Pvt Ltd',
    'TITLE:' + role,
    'TEL;TYPE=CELL:' + mobile,
    'TEL;TYPE=WORK:+919725252120',
    'EMAIL:' + email,
    'ADR:;;601 D&C Dynasty Plaza;Ahmedabad;Gujarat;380009;India',
    'URL:https://www.fenixtours.co.in',
    'END:VCARD'
  ].join('\n');
  var blob = new Blob([vcard], { type: 'text/vcard' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name.replace(/\s+/g,'_') + '_Fenix.vcf';
  a.click(); URL.revokeObjectURL(url);
}

// Gold particles
var pc = document.getElementById('particles');
for (var i = 0; i < 25; i++) {
  var p = document.createElement('div');
  p.className = 'p';
  p.style.left = Math.random() * 100 + '%';
  p.style.bottom = Math.random() * 30 + '%';
  p.style.animationDuration = (4 + Math.random() * 6) + 's';
  p.style.animationDelay = (Math.random() * 6) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
  pc.appendChild(p);
}

setData();
